<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@phybozz's Hub</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="/favicons/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicons/favicon.svg" />
    <link rel="shortcut icon" href="/favicons/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicons/apple-touch-icon.png" />
    <link rel="stylesheet" href="/css/style.css" media="print" onload="this.media='all'">
    <link rel="preconnect" href="https://api.lanyard.rest" crossorigin>
    <link rel="dns-prefetch" href="https://api.lanyard.rest">
    <link rel="preload" href="../font/JetBrainsMono-Regular.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="../font/DMSans-Variable.woff2" as="font" type="font/woff2" crossorigin>
    <meta name="apple-mobile-web-app-title" content="phy's Hub" />
    <link rel="manifest" href="/favicons/site.webmanifest" />
    <meta name="description" content="This is the Hub for @phybozz's social media accounts!"/>
</head>
<body>
    <main>
        <div class="centercontainer">
            <div class="center" id="happywrap">
                <p id="happy">:D</p>
            </div>
            <p id="welcome"><u>Hello, This is my Hub for my social media accounts!</u></p>
        </div>
        <nav class="socialbuttonscontainer" aria-label="Social Media Links">
            <a href="https://www.youtube.com/@PhybozzX" class="socialbuttons" aria-label="YouTube">
                <img src="svg/youtube.svg" alt="" width="32" height="32">
                <span class="label">YouTube</span>
            </a>
            <a href="https://discord.gg/DUuDsJTWQj" class="socialbuttons" aria-label="Discord">
                <img src="svg/discord.svg" alt="" width="32" height="32">
                <span class="label">Discord</span>
            </a>
            <a href="https://www.tiktok.com/@phybozz" class="socialbuttons" aria-label="TikTok">
                <img src="svg/tiktok.svg" alt="" width="32" height="32">
                <span class="label">TikTok</span>
            </a>
            <a href="https://github.com/Phybozz" class="socialbuttons" aria-label="GitHub">
                <img src="svg/github.svg" alt="" width="32" height="32">
                <span class="label">GitHub</span>
            </a>
            <a href="https://ko-fi.com/phybozz" class="socialbuttons" aria-label="Donate">
                <img src="svg/wallet.svg" alt="" width="32" height="32">
                <span class="label">Donate</span>
            </a>
        </nav>
        <div id="cursor"></div>
        <button class="mode-toggle" id="hubInvertBtn">🌙</button>
        <section id="statusWrapper">
            <p id="whatishedoing"><u>What is Phybozz doing?</u></p>
            <p id="statusText"></p>
            <p id="statusTextSpot"></p>
        </section>
    </main>
    <script src="js/index.js" defer></script>
</body>
</html>
